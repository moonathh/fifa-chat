<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Social | FIFA 2026 Support</title>
<link rel="stylesheet" href="../css/styles.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap');

    .social-main {
        background: #f0f2f7;
        overflow-y: auto;
        padding: 0;
    }

    /* ── HERO BANNER ── */
    .social-hero {
        background: linear-gradient(135deg, #001f3f 0%, #003580 60%, #0055b3 100%);
        padding: 28px 32px 24px;
        position: relative;
        overflow: hidden;
    }

    .social-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 80% 50%, rgba(0,198,255,.18) 0%, transparent 70%);
    }

    .social-hero h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 36px;
        color: #fff;
        margin: 0 0 4px;
        letter-spacing: 2px;
        position: relative;
    }

    .social-hero p {
        color: rgba(255,255,255,.6);
        font-size: 13px;
        margin: 0;
        position: relative;
        font-family: 'Nunito', sans-serif;
    }

    /* ── ADD FRIEND CARD ── */
    .add-friend-card {
        margin: 24px 24px 0;
        background: #fff;
        border-radius: 18px;
        padding: 20px 24px;
        box-shadow: 0 4px 20px rgba(0,0,0,.07);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .add-friend-card h3 {
        width: 100%;
        margin: 0 0 12px;
        font-family: 'Nunito', sans-serif;
        font-weight: 800;
        font-size: 15px;
        color: #001f3f;
    }

    .add-friend-input {
        flex: 1;
        min-width: 200px;
        padding: 11px 16px;
        border: 2px solid #e5e9f0;
        border-radius: 12px;
        font-size: 14px;
        font-family: 'Nunito', sans-serif;
        outline: none;
        transition: border-color .2s;
    }

    .add-friend-input:focus {
        border-color: #0055b3;
    }

    .add-friend-btn {
        padding: 11px 22px;
        background: linear-gradient(135deg, #0055b3, #00c6ff);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-weight: 800;
        font-size: 14px;
        font-family: 'Nunito', sans-serif;
        cursor: pointer;
        transition: opacity .2s, transform .1s;
        white-space: nowrap;
    }

    .add-friend-btn:hover { opacity: .88; }
    .add-friend-btn:active { transform: scale(.97); }

    .add-msg {
        width: 100%;
        margin: 0;
        font-size: 13px;
        font-family: 'Nunito', sans-serif;
        color: #00a65a;
        min-height: 18px;
    }

    .add-msg.error { color: #e74c3c; }

    /* ── FRIENDS SECTION ── */
    .friends-section {
        padding: 24px;
    }

    .friends-section-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px;
        letter-spacing: 1.5px;
        color: #001f3f;
        margin: 0 0 16px;
    }

    /* ── FRIEND CARDS GRID ── */
    .friends-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
    }

    .friend-card {
        background: #fff;
        border-radius: 20px;
        overflow: visible;
        box-shadow: 0 4px 20px rgba(0,0,0,.07);
        transition: transform .2s, box-shadow .2s;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px 18px;
        position: relative;
        text-align: center;
    }

    .friend-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 32px rgba(0,0,0,.12);
    }

    /* Avatar container */
    .friend-avatar-wrap {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        position: relative;
        margin-bottom: 12px;
        flex-shrink: 0;
    }

    .friend-avatar-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: linear-gradient(135deg, #e0e7ff, #c7d7f5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        overflow: hidden;
        position: relative;
    }

    .friend-avatar-inner img.friend-photo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
    }

    .friend-frame-img {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90px;
        height: 90px;
        object-fit: contain;
        pointer-events: none;
        z-index: 10;
    }

    .friend-color-frame {
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        z-index: 0;
    }

    .online-dot {
        position: absolute;
        bottom: 2px; right: 2px;
        width: 13px; height: 13px;
        border-radius: 50%;
        background: #2ed573;
        border: 2.5px solid #fff;
        z-index: 20;
    }

    .offline-dot {
        position: absolute;
        bottom: 2px; right: 2px;
        width: 13px; height: 13px;
        border-radius: 50%;
        background: #ccc;
        border: 2.5px solid #fff;
        z-index: 20;
    }

    .friend-name {
        font-family: 'Nunito', sans-serif;
        font-weight: 800;
        font-size: 15px;
        color: #001f3f;
        margin: 0 0 4px;
    }

    .friend-points {
        font-family: 'Nunito', sans-serif;
        font-size: 12px;
        color: #888;
        margin: 0 0 14px;
    }

    .friend-points span {
        color: #0055b3;
        font-weight: 700;
    }

    .friend-chat-btn {
        width: 100%;
        padding: 9px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #001f3f, #0055b3);
        color: #fff;
        font-family: 'Nunito', sans-serif;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        transition: opacity .2s;
    }

    .friend-chat-btn:hover { opacity: .85; }

    /* Empty state */
    .empty-friends {
        text-align: center;
        padding: 48px 24px;
        color: #aaa;
        font-family: 'Nunito', sans-serif;
    }

    .empty-friends .icon {
        font-size: 48px;
        margin-bottom: 12px;
    }

    .empty-friends p {
        font-size: 15px;
        margin: 0;
    }

    /* Email modal */
    .email-modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.55);
        z-index: 9999;
        align-items: center;
        justify-content: center;
    }
    .email-modal-overlay.active { display: flex; }

    .email-modal-box {
        background: #fff;
        width: 90%;
        max-width: 480px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }

    .email-modal-header {
        background: linear-gradient(135deg, #001f3f, #0055b3);
        padding: 20px 24px;
        color: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .email-modal-header h3 { margin: 0; font-size: 17px; }

    .email-modal-close {
        background: none; border: none; color: #fff;
        font-size: 22px; cursor: pointer; line-height: 1;
    }

    .email-modal-body { padding: 24px; }

    .email-modal-body label {
        display: block; font-size: 12px; font-weight: 700;
        color: #555; margin-bottom: 6px; margin-top: 14px;
        text-transform: uppercase; letter-spacing: .5px;
    }

    .email-modal-body label:first-child { margin-top: 0; }

    .email-modal-body input,
    .email-modal-body textarea {
        width: 100%; box-sizing: border-box;
        padding: 11px 14px; border: 2px solid #e5e9f0;
        border-radius: 12px; font-size: 14px;
        font-family: inherit; outline: none;
        transition: border-color .2s;
    }

    .email-modal-body input:focus,
    .email-modal-body textarea:focus { border-color: #0055b3; }

    .email-modal-body textarea { resize: vertical; min-height: 120px; }

    .email-send-btn {
        width: 100%; margin-top: 18px; padding: 13px;
        border: none; border-radius: 12px;
        background: linear-gradient(135deg, #001f3f, #0055b3);
        color: #fff; font-weight: 700; font-size: 15px;
        cursor: pointer; transition: opacity .2s;
    }
    .email-send-btn:hover { opacity: .88; }
    .email-send-btn:disabled { opacity: .5; cursor: not-allowed; }

    .email-msg {
        margin-top: 10px; font-size: 13px;
        text-align: center; min-height: 18px;
        color: #00a65a;
    }
    .email-msg.error { color: #e74c3c; }

    @media (max-width: 600px) {
        .social-hero { padding: 20px; }
        .add-friend-card { margin: 16px 16px 0; }
        .friends-section { padding: 16px; }
        .friends-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }

    /* ── MODAL PERFIL DE AMIGO ── */
    .profile-modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.6);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 16px;
    }
    .profile-modal-overlay.active { display: flex; }

    .profile-modal-box {
        background: #fff;
        width: 100%;
        max-width: 420px;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 24px 60px rgba(0,0,0,.3);
        animation: modalSlideIn .25s ease;
    }

    @keyframes modalSlideIn {
        from { transform: translateY(20px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
    }

    .profile-modal-banner {
        height: 110px;
        background: linear-gradient(135deg, #001f3f 0%, #003580 60%, #0055b3 100%);
        position: relative;
    }

    .profile-modal-close {
        position: absolute;
        top: 12px; right: 14px;
        background: rgba(255,255,255,.2);
        border: none; color: #fff;
        width: 32px; height: 32px;
        border-radius: 50%;
        font-size: 18px; line-height: 1;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: background .2s;
    }
    .profile-modal-close:hover { background: rgba(255,255,255,.35); }

    .profile-modal-avatar-wrap {
        position: absolute;
        bottom: -44px; left: 50%;
        transform: translateX(-50%);
        width: 88px; height: 88px;
        border-radius: 50%;
        border: 4px solid #fff;
        background: #e0e7ff;
        overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        font-size: 36px;
        box-shadow: 0 8px 24px rgba(0,0,0,.15);
        z-index: 2;
    }

    .profile-modal-avatar-wrap img {
        width: 100%; height: 100%; object-fit: cover;
    }

    .profile-modal-icon-frame {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 100px; height: 100px;
        object-fit: contain;
        pointer-events: none;
        z-index: 10;
    }

    .profile-modal-online-dot {
        position: absolute;
        bottom: 4px; right: 4px;
        width: 16px; height: 16px;
        border-radius: 50%;
        border: 3px solid #fff;
        z-index: 15;
    }

    .profile-modal-body {
        padding: 56px 24px 24px;
        text-align: center;
    }

    .profile-modal-name {
        font-family: 'Nunito', sans-serif;
        font-weight: 800;
        font-size: 20px;
        color: #001f3f;
        margin: 0 0 4px;
    }

    .profile-modal-status {
        font-family: 'Nunito', sans-serif;
        font-size: 13px;
        color: #aaa;
        margin: 0 0 18px;
    }

    .profile-modal-stats {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 22px;
    }

    .profile-stat-chip {
        background: #f0f4ff;
        border-radius: 14px;
        padding: 10px 18px;
        text-align: center;
    }

    .profile-stat-chip .val {
        font-family: 'Nunito', sans-serif;
        font-weight: 800;
        font-size: 18px;
        color: #0055b3;
        display: block;
    }

    .profile-stat-chip .lbl {
        font-family: 'Nunito', sans-serif;
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: .5px;
    }

    .profile-modal-actions {
        display: flex;
        gap: 10px;
    }

    .pm-btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 14px;
        font-family: 'Nunito', sans-serif;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        transition: opacity .2s, transform .1s;
    }
    .pm-btn:active { transform: scale(.97); }

    .pm-btn-primary {
        background: linear-gradient(135deg, #001f3f, #0055b3);
        color: #fff;
    }
    .pm-btn-primary:hover { opacity: .88; }

    .pm-btn-secondary {
        background: #f0f4ff;
        color: #0055b3;
    }
    .pm-btn-secondary:hover { background: #e0e9ff; }
</style>
</head>

<body>
<div class="app-layout">

<nav class="navbar-top">
    <div class="logo-area"><span>🏆</span> FIFA 2026™ Support Chat</div>
    <div class="user-profile">
        <span id="user-name-display">Invitado</span>
        <a href="profile.html" class="profile-trigger">
            <div class="avatar">👤</div>
        </a>
    </div>
</nav>

<div class="main-container">

<aside class="sidebar-nav">
    <div class="nav-section">
        <p class="nav-section-title">Comunicación</p>
        <a href="index.html" class="nav-item"><span>💬</span> Chats</a>
        <a href="social.html" class="nav-item active"><span>👥</span> Social</a>
    </div>
    <div class="nav-section">
        <p class="nav-section-title">Comunidad Local</p>
        <a href="help-mty.html" class="nav-item"><span>🤠</span> Ayuda MTY</a>
    </div>
    <div class="nav-section">
        <p class="nav-section-title">Logística</p>
        <a href="task.html" class="nav-item"><span>📋</span> Tareas de Grupo</a>
        <a href="rewards.html" class="nav-item"><span>🎁</span> Tienda</a>
    </div>
</aside>

<main class="chat-window social-main">

    <div class="social-hero">
        <h1>👥 Social</h1>
        <p>Conecta con tus compañeros del mundial</p>
    </div>

    <!-- AGREGAR AMIGO -->
    <div class="add-friend-card">
        <h3>➕ Agregar amigo</h3>
        <input class="add-friend-input" type="email" id="friend-email" placeholder="correo@ejemplo.com">
        <button class="add-friend-btn" id="btn-add-friend">Agregar</button>
        <p class="add-msg" id="msg"></p>
    </div>

    <!-- LISTA DE AMIGOS -->
    <div class="friends-section">
        <div class="friends-section-title">MIS AMIGOS</div>
        <div class="friends-grid" id="friends-list">
            <div class="empty-friends" style="grid-column:1/-1">
                <div class="icon">⏳</div>
                <p>Cargando...</p>
            </div>
        </div>
    </div>

</main>
</div>
</div>

<!-- MODAL: Perfil de Amigo -->
<div class="profile-modal-overlay" id="profile-modal">
    <div class="profile-modal-box">
        <div class="profile-modal-banner">
            <button class="profile-modal-close" onclick="closeProfileModal()">✕</button>
            <div class="profile-modal-avatar-wrap" id="pm-avatar-wrap">
                <span id="pm-avatar-emoji">👤</span>
                <img id="pm-avatar-img" src="" alt="" style="display:none;">
                <img id="pm-icon-frame" class="profile-modal-icon-frame" src="" alt="" style="display:none;">
                <div class="profile-modal-online-dot" id="pm-online-dot" style="background:#ccc;"></div>
            </div>
        </div>
        <div class="profile-modal-body">
            <div class="profile-modal-name" id="pm-name">—</div>
            <div class="profile-modal-status" id="pm-status">● Desconectado</div>
            <div class="profile-modal-stats">
                <div class="profile-stat-chip">
                    <span class="val" id="pm-points">0</span>
                    <span class="lbl">⭐ Puntos</span>
                </div>
                <div class="profile-stat-chip">
                    <span class="val" id="pm-status-icon">😴</span>
                    <span class="lbl">Estado</span>
                </div>
            </div>
            <div class="profile-modal-actions">
                <button class="pm-btn pm-btn-secondary" onclick="closeProfileModal()">Cerrar</button>
                <button class="pm-btn pm-btn-primary" id="pm-chat-btn" onclick="">💬 Enviar mensaje</button>
            </div>
        </div>
    </div>
</div>

<script>
const API    = "https://fifa-chat-dr6w.onrender.com";
const userId = sessionStorage.getItem("user_id");
const userName = sessionStorage.getItem("userName");

if (!userId) window.location.href = "login.html";

document.getElementById("user-name-display").textContent = userName;

const ICON_CATALOG = [
    { id: "icon1", img: "../imagenes/icon1.png" },
    { id: "icon2", img: "../imagenes/icon2.png" },
    { id: "icon3", img: "../imagenes/icon3.png" },
    { id: "icon4", img: "../imagenes/icon4.png" },
    { id: "icon5", img: "../imagenes/icon5.png" },
    { id: "star1", img: "../imagenes/star1.png" },
    { id: "star2", img: "../imagenes/star2.png" },
    { id: "star3", img: "../imagenes/star3.png" },
    { id: "star4", img: "../imagenes/star4.png" },
    { id: "star5", img: "../imagenes/star5.png" },
];

async function loadFriends() {
    const container = document.getElementById("friends-list");
    try {
        const res     = await fetch(`${API}/friends/${userId}`);
        const friends = await res.json();

        container.innerHTML = "";

        if (!friends.length) {
            container.innerHTML = `
                <div class="empty-friends" style="grid-column:1/-1">
                    <div class="icon">👋</div>
                    <p>Aún no tienes amigos. ¡Agrega uno arriba!</p>
                </div>`;
            return;
        }

        friends.forEach(f => {
            const card = document.createElement("div");
            card.className = "friend-card";

            // Foto o emoji
            let photoHTML = `<span>👤</span>`;
            if (f.profile_photo) {
                photoHTML = `<img class="friend-photo" src="${f.profile_photo}" alt="${f.full_name}">`;
            }

            // Marco de color (solo si no hay ícono equipado)
            let frameStyle = "";
            if (f.profile_frame && !f.equipped_icon) {
                frameStyle = `style="background:${f.profile_frame};position:absolute;inset:-3px;border-radius:50%;z-index:0;"`;
            }

            // Ícono equipado como marco
            let iconFrameHTML = "";
            if (f.equipped_icon) {
                const iconData = ICON_CATALOG.find(i => i.id === f.equipped_icon);
                if (iconData) {
                    iconFrameHTML = `<img class="friend-frame-img" src="${iconData.img}" alt="marco">`;
                }
            }

            const onlineDot = f.is_online
                ? `<div class="online-dot" title="En línea"></div>`
                : `<div class="offline-dot" title="Desconectado"></div>`;

            card.innerHTML = `
                <div class="friend-avatar-wrap">
                    ${f.profile_frame && !f.equipped_icon ? `<div ${frameStyle}></div>` : ""}
                    <div class="friend-avatar-inner">
                        ${photoHTML}
                    </div>
                    ${iconFrameHTML}
                    ${onlineDot}
                </div>
                <div class="friend-name">${f.full_name}</div>
                <div class="friend-points">
                    ${f.is_online
                        ? `<span style="color:#2ed573;font-weight:700;">● En línea</span>`
                        : `<span style="color:#aaa;">● Desconectado</span>`}
                    &nbsp;·&nbsp; ⭐ <span>${f.points || 0}</span> pts
                </div>
                <button class="friend-chat-btn" onclick="event.stopPropagation(); openChat('${f.full_name}')">💬 Enviar mensaje</button>
            `;

            // Click en la tarjeta abre el modal de perfil
            card.addEventListener("click", () => openProfileModal(f));

            container.appendChild(card);
        });

    } catch (err) {
        console.error(err);
        container.innerHTML = `
            <div class="empty-friends" style="grid-column:1/-1">
                <div class="icon">❌</div>
                <p>Error cargando amigos</p>
            </div>`;
    }
}

document.getElementById("btn-add-friend").addEventListener("click", async () => {
    const email = document.getElementById("friend-email").value.trim();
    const msg   = document.getElementById("msg");

    msg.className = "add-msg";
    if (!email) { msg.textContent = "Escribe un correo"; return; }

    try {
        const res  = await fetch(`${API}/friends`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: userId, friend_email: email })
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok) {
            msg.textContent = "¡Amigo agregado! ✔";
            document.getElementById("friend-email").value = "";
            loadFriends();
        } else {
            msg.className   = "add-msg error";
            msg.textContent = data.error || "Error al agregar";
        }
    } catch (err) {
        msg.className   = "add-msg error";
        msg.textContent = "Error de conexión";
    }
});

function openChat(name) {
    sessionStorage.setItem("chatTarget", name);
    window.location.href = "index.html";
}

/* ── MODAL DE PERFIL DE AMIGO ── */
function openProfileModal(f) {
    // Avatar
    const emojiEl = document.getElementById("pm-avatar-emoji");
    const imgEl   = document.getElementById("pm-avatar-img");
    if (f.profile_photo) {
        emojiEl.style.display = "none";
        imgEl.src             = f.profile_photo;
        imgEl.style.display   = "block";
    } else {
        emojiEl.style.display = "inline";
        imgEl.style.display   = "none";
    }

    // Ícono / marco equipado
    const iconEl = document.getElementById("pm-icon-frame");
    if (f.equipped_icon) {
        const iconData = ICON_CATALOG.find(i => i.id === f.equipped_icon);
        if (iconData) {
            iconEl.src          = iconData.img;
            iconEl.style.display = "block";
        } else {
            iconEl.style.display = "none";
        }
    } else {
        iconEl.style.display = "none";
    }

    // Marco de color en el wrap
    const wrapEl = document.getElementById("pm-avatar-wrap");
    if (f.profile_frame && !f.equipped_icon) {
        wrapEl.style.border = `4px solid ${f.profile_frame}`;
    } else {
        wrapEl.style.border = "4px solid #fff";
    }

    // Punto de estado online
    const dotEl = document.getElementById("pm-online-dot");
    dotEl.style.background = f.is_online ? "#2ed573" : "#ccc";

    // Textos
    document.getElementById("pm-name").textContent   = f.full_name;
    document.getElementById("pm-points").textContent = f.points || 0;
    document.getElementById("pm-status").innerHTML   = f.is_online
        ? `<span style="color:#2ed573;font-weight:700;">● En línea</span>`
        : `<span style="color:#aaa;">● Desconectado</span>`;
    document.getElementById("pm-status-icon").textContent = f.is_online ? "🟢" : "😴";

    // Botón de chat
    const chatBtn = document.getElementById("pm-chat-btn");
    chatBtn.onclick = () => openChat(f.full_name);

    document.getElementById("profile-modal").classList.add("active");
}

function closeProfileModal() {
    document.getElementById("profile-modal").classList.remove("active");
}

// Cerrar modal al hacer clic fuera
document.getElementById("profile-modal").addEventListener("click", function(e) {
    if (e.target === this) closeProfileModal();
});

loadFriends();
</script>

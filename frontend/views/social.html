<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Social | FIFA 2026 Support</title>
<link rel="stylesheet" href="../css/styles.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap');

    .social-main {
        background: #f0f2f7;
        overflow-y: auto;
        padding: 0;
    }

    /* ── HERO BANNER ── */
    .social-hero {
        background: linear-gradient(135deg, #001f3f 0%, #003580 60%, #0055b3 100%);
        padding: 28px 32px 24px;
        position: relative;
        overflow: hidden;
    }

    .social-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 80% 50%, rgba(0,198,255,.18) 0%, transparent 70%);
    }

    .social-hero h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 36px;
        color: #fff;
        margin: 0 0 4px;
        letter-spacing: 2px;
        position: relative;
    }

    .social-hero p {
        color: rgba(255,255,255,.6);
        font-size: 13px;
        margin: 0;
        position: relative;
        font-family: 'Nunito', sans-serif;
    }

    /* ── ADD FRIEND CARD ── */
    .add-friend-card {
        margin: 24px 24px 0;
        background: #fff;
        border-radius: 18px;
        padding: 20px 24px;
        box-shadow: 0 4px 20px rgba(0,0,0,.07);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .add-friend-card h3 {
        width: 100%;
        margin: 0 0 12px;
        font-family: 'Nunito', sans-serif;
        font-weight: 800;
        font-size: 15px;
        color: #001f3f;
    }

    .add-friend-input {
        flex: 1;
        min-width: 200px;
        padding: 11px 16px;
        border: 2px solid #e5e9f0;
        border-radius: 12px;
        font-size: 14px;
        font-family: 'Nunito', sans-serif;
        outline: none;
        transition: border-color .2s;
    }

    .add-friend-input:focus {
        border-color: #0055b3;
    }

    .add-friend-btn {
        padding: 11px 22px;
        background: linear-gradient(135deg, #0055b3, #00c6ff);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-weight: 800;
        font-size: 14px;
        font-family: 'Nunito', sans-serif;
        cursor: pointer;
        transition: opacity .2s, transform .1s;
        white-space: nowrap;
    }

    .add-friend-btn:hover { opacity: .88; }
    .add-friend-btn:active { transform: scale(.97); }

    .add-msg {
        width: 100%;
        margin: 0;
        font-size: 13px;
        font-family: 'Nunito', sans-serif;
        color: #00a65a;
        min-height: 18px;
    }

    .add-msg.error { color: #e74c3c; }

    /* ── FRIENDS SECTION ── */
    .friends-section {
        padding: 24px;
    }

    .friends-section-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px;
        letter-spacing: 1.5px;
        color: #001f3f;
        margin: 0 0 16px;
    }

    /* ── FRIEND CARDS GRID ── */
    .friends-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
    }

    .friend-card {
        background: #fff;
        border-radius: 20px;
        overflow: visible;
        box-shadow: 0 4px 20px rgba(0,0,0,.07);
        transition: transform .2s, box-shadow .2s;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px 18px;
        position: relative;
        text-align: center;
    }

    .friend-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 32px rgba(0,0,0,.12);
    }

    /* Avatar container */
    .friend-avatar-wrap {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        position: relative;
        margin-bottom: 12px;
        flex-shrink: 0;
    }

    .friend-avatar-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: linear-gradient(135deg, #e0e7ff, #c7d7f5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        overflow: hidden;
        position: relative;
    }

    .friend-avatar-inner img.friend-photo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
    }

    .friend-frame-img {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90px;
        height: 90px;
        object-fit: contain;
        pointer-events: none;
        z-index: 10;
    }

    .friend-color-frame {
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        z-index: 0;
    }

    .online-dot {
        position: absolute;
        bottom: 2px; right: 2px;
        width: 13px; height: 13px;
        border-radius: 50%;
        background: #2ed573;
        border: 2.5px solid #fff;
        z-index: 20;
    }

    .offline-dot {
        position: absolute;
        bottom: 2px; right: 2px;
        width: 13px; height: 13px;
        border-radius: 50%;
        background: #ccc;
        border: 2.5px solid #fff;
        z-index: 20;
    }

    .friend-name {
        font-family: 'Nunito', sans-serif;
        font-weight: 800;
        font-size: 15px;
        color: #001f3f;
        margin: 0 0 4px;
    }

    .friend-points {
        font-family: 'Nunito', sans-serif;
        font-size: 12px;
        color: #888;
        margin: 0 0 14px;
    }

    .friend-points span {
        color: #0055b3;
        font-weight: 700;
    }

    .friend-chat-btn {
        width: 100%;
        padding: 9px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #001f3f, #0055b3);
        color: #fff;
        font-family: 'Nunito', sans-serif;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
        transition: opacity .2s;
    }

    .friend-chat-btn:hover { opacity: .85; }

    /* Empty state */
    .empty-friends {
        text-align: center;
        padding: 48px 24px;
        color: #aaa;
        font-family: 'Nunito', sans-serif;
    }

    .empty-friends .icon {
        font-size: 48px;
        margin-bottom: 12px;
    }

    .empty-friends p {
        font-size: 15px;
        margin: 0;
    }

    @media (max-width: 600px) {
        .social-hero { padding: 20px; }
        .add-friend-card { margin: 16px 16px 0; }
        .friends-section { padding: 16px; }
        .friends-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
</style>
</head>

<body>
<div class="app-layout">

<nav class="navbar-top">
    <div class="logo-area"><span>🏆</span> FIFA 2026™ Support Chat</div>
    <div class="user-profile">
        <span id="user-name-display">Invitado</span>
        <a href="profile.html" class="profile-trigger">
            <div class="avatar">👤</div>
        </a>
    </div>
</nav>

<div class="main-container">

<aside class="sidebar-nav">
    <div class="nav-section">
        <p class="nav-section-title">Comunicación</p>
        <a href="index.html" class="nav-item"><span>💬</span> Chats</a>
        <a href="social.html" class="nav-item active"><span>👥</span> Social</a>
    </div>
    <div class="nav-section">
        <p class="nav-section-title">Comunidad Local</p>
        <a href="help-mty.html" class="nav-item"><span>🤠</span> Ayuda MTY</a>
    </div>
    <div class="nav-section">
        <p class="nav-section-title">Logística</p>
        <a href="task.html" class="nav-item"><span>📋</span> Tareas de Grupo</a>
        <a href="rewards.html" class="nav-item"><span>🎁</span> Tienda</a>
    </div>
</aside>

<main class="chat-window social-main">

    <div class="social-hero">
        <h1>👥 Social</h1>
        <p>Conecta con tus compañeros del mundial</p>
    </div>

    <!-- AGREGAR AMIGO -->
    <div class="add-friend-card">
        <h3>➕ Agregar amigo</h3>
        <input class="add-friend-input" type="email" id="friend-email" placeholder="correo@ejemplo.com">
        <button class="add-friend-btn" id="btn-add-friend">Agregar</button>
        <p class="add-msg" id="msg"></p>
    </div>

    <!-- LISTA DE AMIGOS -->
    <div class="friends-section">
        <div class="friends-section-title">MIS AMIGOS</div>
        <div class="friends-grid" id="friends-list">
            <div class="empty-friends" style="grid-column:1/-1">
                <div class="icon">⏳</div>
                <p>Cargando...</p>
            </div>
        </div>
    </div>

</main>
</div>
</div>

<script>
const API    = "https://fifa-chat-dr6w.onrender.com";
const userId = sessionStorage.getItem("user_id");
const userName = sessionStorage.getItem("userName");

if (!userId) window.location.href = "login.html";

document.getElementById("user-name-display").textContent = userName;

const ICON_CATALOG = [
    { id: "icon1", img: "../imagenes/icon1.png" },
    { id: "icon2", img: "../imagenes/icon2.png" },
    { id: "icon3", img: "../imagenes/icon3.png" },
    { id: "icon4", img: "../imagenes/icon4.png" },
    { id: "icon5", img: "../imagenes/icon5.png" },
    { id: "star1", img: "../imagenes/star1.png" },
    { id: "star2", img: "../imagenes/star2.png" },
    { id: "star3", img: "../imagenes/star3.png" },
    { id: "star4", img: "../imagenes/star4.png" },
    { id: "star5", img: "../imagenes/star5.png" },
];

async function loadFriends() {
    const container = document.getElementById("friends-list");
    try {
        const res     = await fetch(`${API}/friends/${userId}`);
        const friends = await res.json();

        container.innerHTML = "";

        if (!friends.length) {
            container.innerHTML = `
                <div class="empty-friends" style="grid-column:1/-1">
                    <div class="icon">👋</div>
                    <p>Aún no tienes amigos. ¡Agrega uno arriba!</p>
                </div>`;
            return;
        }

        friends.forEach(f => {
            const card = document.createElement("div");
            card.className = "friend-card";

            // Foto o emoji
            let photoHTML = `<span>👤</span>`;
            if (f.profile_photo) {
                photoHTML = `<img class="friend-photo" src="${f.profile_photo}" alt="${f.full_name}">`;
            }

            // Marco de color (solo si no hay ícono equipado)
            let frameStyle = "";
            if (f.profile_frame && !f.equipped_icon) {
                frameStyle = `style="background:${f.profile_frame};position:absolute;inset:-3px;border-radius:50%;z-index:0;"`;
            }

            // Ícono equipado como marco
            let iconFrameHTML = "";
            if (f.equipped_icon) {
                const iconData = ICON_CATALOG.find(i => i.id === f.equipped_icon);
                if (iconData) {
                    iconFrameHTML = `<img class="friend-frame-img" src="${iconData.img}" alt="marco">`;
                }
            }

            const onlineDot = f.is_online
                ? `<div class="online-dot" title="En línea"></div>`
                : `<div class="offline-dot" title="Desconectado"></div>`;

            card.innerHTML = `
                <div class="friend-avatar-wrap">
                    ${f.profile_frame && !f.equipped_icon ? `<div ${frameStyle}></div>` : ""}
                    <div class="friend-avatar-inner">
                        ${photoHTML}
                    </div>
                    ${iconFrameHTML}
                    ${onlineDot}
                </div>
                <div class="friend-name">${f.full_name}</div>
                <div class="friend-points">
                    ${f.is_online
                        ? `<span style="color:#2ed573;font-weight:700;">● En línea</span>`
                        : `<span style="color:#aaa;">● Desconectado</span>`}
                    &nbsp;·&nbsp; ⭐ <span>${f.points || 0}</span> pts
                </div>
                <button class="friend-chat-btn" onclick="openChat('${f.full_name}')">💬 Enviar mensaje</button>
            `;

            container.appendChild(card);
        });

    } catch (err) {
        console.error(err);
        container.innerHTML = `
            <div class="empty-friends" style="grid-column:1/-1">
                <div class="icon">❌</div>
                <p>Error cargando amigos</p>
            </div>`;
    }
}

document.getElementById("btn-add-friend").addEventListener("click", async () => {
    const email = document.getElementById("friend-email").value.trim();
    const msg   = document.getElementById("msg");

    msg.className = "add-msg";
    if (!email) { msg.textContent = "Escribe un correo"; return; }

    try {
        const res  = await fetch(`${API}/friends`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: userId, friend_email: email })
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok) {
            msg.textContent = "¡Amigo agregado! ✔";
            document.getElementById("friend-email").value = "";
            loadFriends();
        } else {
            msg.className   = "add-msg error";
            msg.textContent = data.error || "Error al agregar";
        }
    } catch (err) {
        msg.className   = "add-msg error";
        msg.textContent = "Error de conexión";
    }
});

function openChat(name) {
    sessionStorage.setItem("chatTarget", name);
    window.location.href = "index.html";
}

loadFriends();
</script>
<script src="../js/navbar.js"></script>
</body>
</html>

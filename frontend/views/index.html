<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chats | FIFA 2026 Support</title>
<link rel="stylesheet" href="../css/styles.css">
</head>

<body>
<div class="app-layout">

<!-- NAV -->
<nav class="navbar-top">
    <div class="logo-area"><span>🏆</span> FIFA 2026™ Support Chat</div>

    <div class="user-profile">
        <span id="userHeaderName">Invitado</span>
        <a href="profile.html" class="profile-trigger">
            <div class="avatar">👤</div>
        </a>
    </div>
</nav>

<div class="main-container">

<!-- SIDEBAR -->
<aside class="sidebar-nav">
    <div class="nav-section">
        <p class="nav-section-title">Comunicación</p>
        <a href="#" class="nav-item active" onclick="toggleSidebar(event)">💬 Chats</a>
        <a href="social.html" class="nav-item">👥 Social</a>
    </div>

    <div class="nav-section">
        <p class="nav-section-title">Comunidad Local</p>
        <a href="help-mty.html" class="nav-item">🤠 Ayuda MTY</a>
    </div>

    <div class="nav-section">
        <p class="nav-section-title">Logística</p>
        <a href="task.html" class="nav-item">📋 Tareas de Grupo</a>
        <a href="rewards.html" class="nav-item">🎁 Tienda</a>
    </div>
</aside>

<!-- CHAT SIDEBAR -->
<aside class="chat-sidebar collapsed" id="chat-sidebar">

    <div class="chat-sidebar-header">
        <h3>💬 Conversaciones</h3>
    </div>

    <div class="chat-section-title">Amigos</div>
    <div id="friends-sidebar"></div>

    <div class="chat-section-title">Grupos</div>
    <div id="groups-sidebar"></div>

</aside>

<!-- CHAT -->
<main class="chat-window">

<header class="chat-header">
    <div style="display:flex;gap:10px;align-items:center;">
        <div class="avatar-micro" id="header-avatar">👤</div>
        <div>
            <strong id="current-group-name">@Chat</strong>
            <p id="header-status-text" style="margin:0;font-size:10px;">● En línea</p>
        </div>
    </div>
</header>

<section class="chat-messages" id="chat-messages-area"></section>

<footer class="input-bar">
    <input type="text" id="input-chat-main" placeholder="Enviar mensaje...">
    <button onclick="enviarMensaje()">Enviar</button>
</footer>

</main>
</div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

/* ======================
   🔥 CONFIG BACKEND
====================== */
const API_URL = "https://fifa-chat-dr6w.onrender.com";

/* ======================
   SESSION
====================== */
const userId = sessionStorage.getItem("user_id");
const userName = sessionStorage.getItem("userName");

if (!userId) window.location.href = "login.html";

document.getElementById("userHeaderName").textContent = userName;

/* ======================
   SOCKET
====================== */
const socket = io(API_URL);

let chatId = null;

/* ======================
   SIDEBAR
====================== */
function toggleSidebar(e) {
    if (e) e.preventDefault();

    const sidebar = document.getElementById("chat-sidebar");
    sidebar.classList.toggle("collapsed");
    sidebar.classList.toggle("open");
}

/* ======================
   JOIN CHAT ROOM
====================== */
function joinChat(id) {
    if (chatId) {
        socket.emit("leave", chatId);
    }

    chatId = id;

    socket.emit("join_chat", chatId);

    loadMessages();
}

/* ======================
   FRIENDS
====================== */
async function loadFriends() {
    const res = await fetch(`${API_URL}/friends/${userId}`);
    const friends = await res.json();

    const container = document.getElementById("friends-sidebar");
    container.innerHTML = "";

    friends.forEach(f => {
        const div = document.createElement("div");
        div.className = "friend-item";
        div.innerHTML = `👤 ${f.full_name}`;

        div.onclick = () => {
    document.getElementById("current-group-name").textContent = f.full_name;
    document.getElementById("header-avatar").textContent = "👤";
    document.getElementById("header-status-text").textContent = "● Privado";

    // Genera un chat_id único y consistente entre los dos usuarios
    const id1 = Math.min(parseInt(userId), parseInt(f.id));
    const id2 = Math.max(parseInt(userId), parseInt(f.id));
    const privateChatId = `${id1}_${id2}`;

    joinChat(privateChatId);
};

        container.appendChild(div);
    });
}

/* ======================
   GROUPS (mock)
====================== */
function loadGroups() {
    const groups = [
        { id: 1, name: "General" },
        { id: 2, name: "Viaje CDMX" }
    ];

    const container = document.getElementById("groups-sidebar");
    container.innerHTML = "";

    groups.forEach(g => {
        const div = document.createElement("div");
        div.className = "friend-item";
        div.innerHTML = `👥 ${g.name}`;

        div.onclick = () => {
            document.getElementById("current-group-name").textContent = g.name;
            document.getElementById("header-avatar").textContent = "👥";
            document.getElementById("header-status-text").textContent = "● Grupo";

            joinChat(g.id);
        };

        container.appendChild(div);
    });
}

/* ======================
   LOAD MESSAGES
====================== */
async function loadMessages() {
    if (!chatId) return;

    const res = await fetch(`${API_URL}/messages/${chatId}`);
    const msgs = await res.json();

    const container = document.getElementById("chat-messages-area");
    container.innerHTML = "";

    msgs.forEach(renderMessage);
}

/* ======================
   RENDER MESSAGE
====================== */
function renderMessage(msg) {
    const container = document.getElementById("chat-messages-area");

    const div = document.createElement("div");
    div.className = msg.username === userName
        ? "message-wrapper sent"
        : "message-wrapper received";

    div.innerHTML = `
        <div class="message-bubble">
            <b>${msg.username}</b><br>
            ${msg.message}
        </div>
    `;

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

/* ======================
   SOCKET EVENTS
====================== */
socket.on("new_message", (msg) => {
    if (msg.chat_id != chatId) return;
    renderMessage(msg);
});

/* ======================
   SEND MESSAGE
====================== */
async function enviarMensaje() {
    const input = document.getElementById("input-chat-main");
    const message = input.value.trim();

    if (!message || !chatId) return;

    await fetch(`${API_URL}/messages`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            chat_id: chatId,
            username: userName,
            message
        })
    });

    input.value = "";
}

/* ======================
   INIT
====================== */
loadFriends();
loadGroups();

</script>

</body>
</html>

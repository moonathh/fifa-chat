<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chats | FIFA 2026 Support</title>
<link rel="stylesheet" href="../css/styles.css">

<style>
.modal-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
z-index:9999;
align-items:center;
justify-content:center;
}
.modal-overlay.active{display:flex;}

.modal-box{
background:#fff;
width:90%;
max-width:460px;
border-radius:18px;
padding:28px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.modal-box h3{
margin:0 0 18px;
color:#0b2341;
}

.modal-box label{
display:block;
font-size:12px;
font-weight:700;
margin-bottom:5px;
margin-top:10px;
}

.modal-box input,
.modal-box select{
width:100%;
padding:11px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

.modal-actions{
display:flex;
gap:10px;
margin-top:18px;
}

.modal-actions button{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

.btn-cancel{background:#eceff3;}
.btn-primary{background:#00bcd4;color:#fff;}

.chat-sidebar{
width:320px;
transition:.25s;
overflow:auto;
}

.chat-sidebar.collapsed{
width:0;
overflow:hidden;
}

.chat-sidebar.open{width:320px;}

.friend-item{
padding:12px 14px;
cursor:pointer;
border-bottom:1px solid #f0f0f0;
}

.friend-item:hover{background:#f7f7f7;}

.group-item-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.group-edit-btn{
border:none;
background:none;
cursor:pointer;
font-size:14px;
}

.create-group-btn{
margin:10px;
padding:12px;
width:calc(100% - 20px);
border:none;
border-radius:8px;
background:#00bcd4;
color:#fff;
font-weight:700;
cursor:pointer;
}

.emoji-picker{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:8px;
}

.emoji-option{
font-size:24px;
cursor:pointer;
padding:6px;
border-radius:8px;
}

.emoji-option.selected{
background:#dff9ff;
border:2px solid #00bcd4;
}

.friend-check-list{
max-height:180px;
overflow:auto;
border:1px solid #eee;
padding:10px;
border-radius:8px;
margin-top:8px;
}

.friend-check-item{
display:flex;
gap:10px;
padding:7px;
cursor:pointer;
}

/* TASKS */
.task-panel-toggle{
background:#fff;
border:1px solid #ddd;
border-radius:8px;
padding:5px 10px;
cursor:pointer;
font-size:12px;
font-weight:700;
}

.task-panel{
display:none;
padding:10px 14px;
border-top:1px solid #eee;
background:#fafafa;
}

.task-panel.open{display:block;}

.task-mini-card{
background:#fff;
border:1px solid #eee;
border-radius:10px;
padding:9px 10px;
margin-bottom:8px;
font-size:12px;
}

.task-mini-card.done{opacity:.6;}

.task-mini-card h4{
margin:0 0 4px;
font-size:13px;
}

.progress-wrap{
height:6px;
background:#eee;
border-radius:999px;
overflow:hidden;
margin-top:6px;
}

.progress-bar{
height:100%;
background:#00bcd4;
}
</style>
</head>

<body>

<div class="app-layout">

<nav class="navbar-top">
<div class="logo-area">🏆 FIFA 2026™ Support Chat</div>

<div class="user-profile">
<span id="userHeaderName">Invitado</span>
<a href="profile.html"><div class="avatar">👤</div></a>
</div>
</nav>

<div class="main-container">

<!-- MENU -->
<aside class="sidebar-nav">
<div class="nav-section">
<p class="nav-section-title">Comunicación</p>
<a href="#" class="nav-item active" onclick="toggleSidebar(event)">💬 Chats</a>
<a href="social.html" class="nav-item">👥 Social</a>
</div>

<div class="nav-section">
<p class="nav-section-title">Comunidad</p>
<a href="help-mty.html" class="nav-item">🤠 Ayuda MTY</a>
</div>

<div class="nav-section">
<p class="nav-section-title">Extras</p>
<a href="task.html" class="nav-item">📋 Tareas</a>
<a href="rewards.html" class="nav-item">🎁 Tienda</a>
</div>
</aside>

<!-- SIDEBAR -->
<aside class="chat-sidebar collapsed" id="chat-sidebar">

<div style="padding:15px;font-weight:700;">💬 Conversaciones</div>

<div style="padding:10px 15px;font-size:12px;">Amigos</div>
<div id="friends-sidebar"></div>

<div style="padding:10px 15px;font-size:12px;">Grupos</div>
<div id="groups-sidebar"></div>

<button class="create-group-btn" onclick="openCreateGroupModal()">
➕ Crear grupo
</button>

</aside>

<!-- CHAT -->
<main class="chat-window">

<header class="chat-header">
<div style="display:flex;gap:10px;align-items:center;">
<div id="header-avatar">👤</div>

<div>
<strong id="current-group-name">@Chat</strong>
<p id="header-status-text" style="margin:0;font-size:12px;">● En línea</p>
</div>
</div>

<button id="tasks-toggle-btn"
class="task-panel-toggle"
style="display:none"
onclick="toggleTaskPanel()">
📋 Tareas
</button>
</header>

<div class="task-panel" id="task-panel">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
<h4 style="margin:0;">Misiones</h4>
<button class="btn-primary" onclick="openCreateTaskModal()">+ Nueva</button>
</div>
<div id="task-panel-list"></div>
</div>

<section class="chat-messages" id="chat-messages-area"></section>

<footer class="input-bar">
<input type="text" id="input-chat-main" placeholder="Enviar mensaje...">
<button onclick="enviarMensaje()">Enviar</button>
</footer>

</main>
</div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-create-group">
<div class="modal-box">
<h3>Crear Grupo</h3>

<label>Nombre</label>
<input id="new-group-name">

<label>Icono</label>
<div class="emoji-picker" id="emoji-picker-create">
<span class="emoji-option selected" data-emoji="👥">👥</span>
<span class="emoji-option" data-emoji="⚽">⚽</span>
<span class="emoji-option" data-emoji="🏆">🏆</span>
<span class="emoji-option" data-emoji="🔥">🔥</span>
</div>

<label>Amigos</label>
<div class="friend-check-list" id="friend-check-list"></div>

<small id="create-group-error" style="color:red;"></small>

<div class="modal-actions">
<button class="btn-cancel" onclick="closeModal('modal-create-group')">Cancelar</button>
<button class="btn-primary" onclick="crearGrupo()">Crear</button>
</div>
</div>
</div>

<div class="modal-overlay" id="modal-edit-group">
<div class="modal-box">
<h3>Editar Grupo</h3>

<input type="hidden" id="edit-group-id">

<label>Nombre</label>
<input id="edit-group-name">

<label>Icono</label>
<div class="emoji-picker" id="emoji-picker-edit">
<span class="emoji-option selected" data-emoji="👥">👥</span>
<span class="emoji-option" data-emoji="⚽">⚽</span>
<span class="emoji-option" data-emoji="🏆">🏆</span>
</div>

<div class="modal-actions">
<button class="btn-cancel" onclick="closeModal('modal-edit-group')">Cancelar</button>
<button class="btn-primary" onclick="guardarEdicionGrupo()">Guardar</button>
</div>
</div>
</div>

<div class="modal-overlay" id="modal-create-task">
<div class="modal-box">
<h3>Nueva tarea automática</h3>

<label>Título</label>
<input id="new-task-title">

<label>Descripción</label>
<input id="new-task-desc">

<label>Tipo</label>
<select id="new-task-type">
<option value="messages">Mensajes enviados</option>
</select>

<label>Meta</label>
<input type="number" id="new-task-target" value="50">

<label>Puntos</label>
<input type="number" id="new-task-points" value="100">

<div class="modal-actions">
<button class="btn-cancel" onclick="closeModal('modal-create-task')">Cancelar</button>
<button class="btn-primary" onclick="crearTarea()">Crear</button>
</div>
</div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const API_URL = "https://fifa-chat-dr6w.onrender.com";

const userId = sessionStorage.getItem("user_id") || localStorage.getItem("user_id");
const userName = sessionStorage.getItem("userName") || localStorage.getItem("userName");

if (!userId || !userName) {
    location.href = "login.html";
}

document.getElementById("userHeaderName").textContent = userName;

const socket = io(API_URL);

let chatId = null;
let currentGroup = null;
let myFriends = [];
let chatType = "private";

/* SIDEBAR */
function toggleSidebar(e) {
    if (e) e.preventDefault();
    const sb = document.getElementById("chat-sidebar");
    sb.classList.toggle("collapsed");
    sb.classList.toggle("open");
}

/* MODALS */
function openModal(id) {
    document.getElementById(id).classList.add("active");
}

function closeModal(id) {
    document.getElementById(id).classList.remove("active");
}

/* EMOJI */
document.querySelectorAll(".emoji-picker").forEach(p => {
    p.querySelectorAll(".emoji-option").forEach(o => {
        o.onclick = () => {
            p.querySelectorAll(".emoji-option").forEach(x => x.classList.remove("selected"));
            o.classList.add("selected");
        };
    });
});

function selectedEmoji(id) {
    return document.querySelector(`#${id} .selected`)?.dataset.emoji || "👥";
}

/* CHAT */
function joinChat(id, type, group = null) {
    if (chatId) {
        socket.emit("leave_chat", chatId);
    }

    chatId = id;
    chatType = type;
    currentGroup = group;

    socket.emit("join_chat", chatId);

    if (type === "group") {
        document.getElementById("tasks-toggle-btn").style.display = "block";
    } else {
        document.getElementById("tasks-toggle-btn").style.display = "none";
        closeTaskPanel();
    }

    loadMessages();
}

/* FRIENDS */
async function loadFriends() {
    const res = await fetch(`${API_URL}/friends/${userId}`);
    myFriends = await res.json();

    const c = document.getElementById("friends-sidebar");
    c.innerHTML = "";

    myFriends.forEach(f => {
        const div = document.createElement("div");
        div.className = "friend-item";
        div.textContent = "👤 " + f.full_name;

        div.onclick = () => {
            document.getElementById("current-group-name").textContent = f.full_name;
            document.getElementById("header-avatar").textContent = "👤";
            document.getElementById("header-status-text").textContent = "● Privado";

            const a = Math.min(+userId, +f.id);
            const b = Math.max(+userId, +f.id);

            joinChat(`${a}_${b}`, "private");
        };

        c.appendChild(div);
    });
}

/* GROUPS */
async function loadGroups() {
    const res = await fetch(`${API_URL}/groups/${userId}`);
    const groups = await res.json();

    const c = document.getElementById("groups-sidebar");
    c.innerHTML = "";

    groups.forEach(g => {
        const div = document.createElement("div");
        div.className = "friend-item";

        div.innerHTML = `
        <div class="group-item-row">
            <span>${g.image_url} ${g.name}</span>
            ${g.created_by == userId ? `<button class="group-edit-btn">✏️</button>` : ""}
        </div>`;

        div.onclick = (e) => {
            if (e.target.classList.contains("group-edit-btn")) {
                openEditGroupModal(e, g.id, g.name, g.image_url);
                return;
            }

            document.getElementById("current-group-name").textContent = `${g.image_url} ${g.name}`;
            document.getElementById("header-avatar").textContent = g.image_url;
            document.getElementById("header-status-text").textContent = "● Grupo";

            joinChat(`group_${g.id}`, "group", g);
            loadGroupTasks(g.id);
        };

        c.appendChild(div);
    });
}

/* TASKS */
function toggleTaskPanel() {
    const p = document.getElementById("task-panel");
    p.classList.toggle("open");

    if (p.classList.contains("open") && currentGroup) {
        loadGroupTasks(currentGroup.id);
    }
}

function closeTaskPanel() {
    document.getElementById("task-panel").classList.remove("open");
}

async function loadGroupTasks(groupId) {
    const list = document.getElementById("task-panel-list");
    list.innerHTML = "Cargando...";

    const res = await fetch(`${API_URL}/tasks/${groupId}`);
    const tasks = await res.json();

    list.innerHTML = "";

    tasks.forEach(t => {
        const current = t.current_value || 0;
        const target = t.target_value || 0;
        const percent = target > 0 ? Math.min((current / target) * 100, 100) : 0;

        const div = document.createElement("div");
        div.className = `task-mini-card ${t.completed ? "done" : ""}`;

        div.innerHTML = `
        <h4>${t.title}</h4>
        <div>${current}/${target}</div>
        <div class="progress-wrap">
            <div class="progress-bar" style="width:${percent}%"></div>
        </div>`;

        list.appendChild(div);
    });
}

/* SOCKET EVENTS */
socket.on("new_message", (msg) => {
    if (String(msg.chat_id).trim() !== String(chatId).trim()) return;

    renderMessage(msg);

    if (chatType === "group" && currentGroup &&
        document.getElementById("task-panel").classList.contains("open")) {
        setTimeout(() => loadGroupTasks(currentGroup.id), 500);
    }
});

socket.on("task_progress", () => {
    if (chatType === "group" && currentGroup) {
        loadGroupTasks(currentGroup.id);
    }
});

/* MESSAGES */
async function loadMessages() {
    if (!chatId) return;

    const res = await fetch(`${API_URL}/messages/${chatId}`);
    const msgs = await res.json();

    const c = document.getElementById("chat-messages-area");
    c.innerHTML = "";
    msgs.forEach(renderMessage);
}

function renderMessage(msg) {
    const c = document.getElementById("chat-messages-area");

    const div = document.createElement("div");
    div.className = msg.username === userName ? "message-wrapper sent" : "message-wrapper received";

    div.innerHTML = `
    <div class="message-bubble">
        <b>${msg.username}</b><br>
        ${msg.message}
    </div>`;

    c.appendChild(div);
    c.scrollTop = c.scrollHeight;
}

/* SEND */
async function enviarMensaje() {
    const input = document.getElementById("input-chat-main");
    const message = input.value.trim();
    if (!message || !chatId) return;

    socket.emit("send_message", {
        chat_id: chatId,
        username: userName,
        message
    });

    input.value = "";

    if (chatType === "group" && currentGroup &&
        document.getElementById("task-panel").classList.contains("open")) {
        setTimeout(() => loadGroupTasks(currentGroup.id), 500);
    }
}

document.getElementById("input-chat-main").addEventListener("keydown", e => {
    if (e.key === "Enter") enviarMensaje();
});

/* GROUP CREATE */
function openCreateGroupModal() {
    document.getElementById("friend-check-list").innerHTML = myFriends.map(f =>
        `<label class="friend-check-item"><input type="checkbox" value="${f.id}"> ${f.full_name}</label>`
    ).join("");

    openModal("modal-create-group");
}

async function crearGrupo() {
    const name = document.getElementById("new-group-name").value.trim();
    const image_url = selectedEmoji("emoji-picker-create");

    const checked = [...document.querySelectorAll("#friend-check-list input:checked")];
    const member_ids = checked.map(x => +x.value);

    await fetch(`${API_URL}/groups`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, image_url, created_by: userId, member_ids })
    });

    closeModal("modal-create-group");
    loadGroups();
}

/* EDIT GROUP */
function openEditGroupModal(e, id, name) {
    e.stopPropagation();
    document.getElementById("edit-group-id").value = id;
    document.getElementById("edit-group-name").value = name;
    openModal("modal-edit-group");
}

async function guardarEdicionGrupo() {
    const id = document.getElementById("edit-group-id").value;
    const name = document.getElementById("edit-group-name").value.trim();
    const image_url = selectedEmoji("emoji-picker-edit");

    await fetch(`${API_URL}/groups/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, image_url, user_id: userId })
    });

    closeModal("modal-edit-group");
    loadGroups();
}

/* CREATE TASK */
function openCreateTaskModal() {
    openModal("modal-create-task");
}

async function crearTarea() {
    const title = document.getElementById("new-task-title").value.trim();
    const description = document.getElementById("new-task-desc").value.trim();
    const points = parseInt(document.getElementById("new-task-points").value);
    const task_type = document.getElementById("new-task-type").value;
    const target_value = parseInt(document.getElementById("new-task-target").value);

    await fetch(`${API_URL}/tasks`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            group_id: currentGroup.id,
            title,
            description,
            points,
            task_type,
            target_value,
            created_by: userId
        })
    });

    closeModal("modal-create-task");
    loadGroupTasks(currentGroup.id);
}

/* INIT */
loadFriends();
loadGroups();
</script>

</body>
</html>

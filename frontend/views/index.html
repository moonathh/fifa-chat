<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chats | FIFA 2026 Support</title>
<link rel="stylesheet" href="../css/styles.css">

<style>
.modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    z-index:9999;
    align-items:center;
    justify-content:center;
}
.modal-overlay.active{ display:flex; }

.modal-box{
    background:#fff;
    width:90%;
    max-width:480px;
    border-radius:18px;
    padding:28px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
    max-height:90vh;
    overflow-y:auto;
}

.modal-box h3{
    margin:0 0 18px;
    color:#0b2341;
}

.modal-box label{
    display:block;
    font-size:12px;
    font-weight:700;
    margin-bottom:5px;
    margin-top:14px;
    color:#555;
    text-transform:uppercase;
    letter-spacing:.5px;
}

.modal-box input,
.modal-box select{
    width:100%;
    padding:11px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    box-sizing:border-box;
}

.modal-actions{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.modal-actions button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
    font-size:14px;
}

.btn-cancel{ background:#eceff3; color:#333; }
.btn-primary{ background:#00bcd4; color:#fff; }

.task-type-grid{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:8px;
    margin-top:8px;
}

.task-type-option{
    border:2px solid #eee;
    border-radius:10px;
    padding:12px 8px;
    text-align:center;
    cursor:pointer;
    transition:all .2s;
}

.task-type-option:hover{ border-color:#00bcd4; }

.task-type-option.selected{
    border-color:#00bcd4;
    background:#e0f7fa;
}

.task-type-option .icon{ font-size:22px; margin-bottom:4px; }
.task-type-option .label{ font-size:11px; font-weight:700; color:#444; }

.points-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:8px;
}

.points-row input[type=range]{
    flex:1;
    border:none;
    padding:0;
}

.points-badge{
    background:#0b2341;
    color:#fff;
    padding:4px 10px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
    min-width:52px;
    text-align:center;
}

.chat-sidebar{
    width:320px;
    transition:.25s;
    overflow:auto;
}
.chat-sidebar.collapsed{ width:0; overflow:hidden; }
.chat-sidebar.open{ width:320px; }

.friend-item{
    padding:12px 14px;
    cursor:pointer;
    border-bottom:1px solid #f0f0f0;
}
.friend-item:hover{ background:#f7f7f7; }

.group-item-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.group-edit-btn{
    border:none;
    background:none;
    cursor:pointer;
    font-size:14px;
}

.create-group-btn{
    margin:10px;
    padding:12px;
    width:calc(100% - 20px);
    border:none;
    border-radius:8px;
    background:#00bcd4;
    color:#fff;
    font-weight:700;
    cursor:pointer;
}

.emoji-picker{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:8px;
}

.emoji-option{
    font-size:24px;
    cursor:pointer;
    padding:6px;
    border-radius:8px;
}
.emoji-option.selected{
    background:#dff9ff;
    border:2px solid #00bcd4;
}

.friend-check-list{
    max-height:180px;
    overflow:auto;
    border:1px solid #eee;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
}

.friend-check-item{
    display:flex;
    gap:10px;
    padding:7px;
    cursor:pointer;
}

.task-panel-toggle{
    background:#fff;
    border:1px solid #ddd;
    border-radius:8px;
    padding:5px 10px;
    cursor:pointer;
    font-size:12px;
    font-weight:700;
}

.task-panel{
    display:none;
    padding:10px 14px;
    border-top:1px solid #eee;
    background:#fafafa;
}
.task-panel.open{ display:block; }

.task-mini-card{
    background:#fff;
    border:1px solid #eee;
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:8px;
    font-size:12px;
}
.task-mini-card.done{ opacity:.55; }

.task-mini-card-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:4px;
}

.task-mini-card h4{
    margin:0;
    font-size:13px;
    color:#0b2341;
}

.task-type-badge{
    font-size:10px;
    padding:2px 7px;
    border-radius:20px;
    font-weight:700;
    background:#e0f7fa;
    color:#00838f;
}

.task-assigned{
    font-size:11px;
    color:#888;
    margin-bottom:4px;
}

.task-progress-label{
    display:flex;
    justify-content:space-between;
    color:#666;
    margin-bottom:4px;
}

.progress-wrap{
    height:6px;
    background:#eee;
    border-radius:999px;
    overflow:hidden;
}
.progress-bar{
    height:100%;
    background:#00bcd4;
    transition:width .4s ease;
}
.progress-bar.done{ background:#4caf50; }

.task-points{
    font-size:11px;
    color:#888;
    margin-top:4px;
    text-align:right;
}

.chat-messages{
    flex:1;
    overflow-y:auto;
    padding:15px;
    background:#f7f7f7;
}

.message-wrapper{
    display:flex;
    margin-bottom:10px;
}

.message-wrapper.sent{
    justify-content:flex-end;
}

.message-wrapper.received{
    justify-content:flex-start;
}

.message-bubble{
    max-width:70%;
    background:#00bcd4;
    color:#fff;
    padding:10px 14px;
    border-radius:14px;
    font-size:14px;
    line-height:1.4;
}

.message-wrapper.received .message-bubble{
    background:#fff;
    color:#222;
    border:1px solid #ddd;
}
</style>

</head>

<body>

<div class="app-layout">

<nav class="navbar-top">
    <div class="logo-area">🏆 FIFA 2026™ Support Chat</div>
    <div class="user-profile">
        <span id="userHeaderName">Invitado</span>
        <a href="profile.html"><div class="avatar" id="miniAvatar">👤</div></a>
    </div>
</nav>

<div class="main-container">

    <aside class="sidebar-nav">
        <div class="nav-section">
            <p class="nav-section-title">Comunicación</p>
            <a href="#" class="nav-item active" onclick="toggleSidebar(event)">💬 Chats</a>
            <a href="social.html" class="nav-item">👥 Social</a>
        </div>
        <div class="nav-section">
            <p class="nav-section-title">Comunidad</p>
            <a href="help-mty.html" class="nav-item">🤠 Ayuda MTY</a>
        </div>
        <div class="nav-section">
            <p class="nav-section-title">Extras</p>
            <a href="task.html" class="nav-item">📋 Tareas</a>
            <a href="rewards.html" class="nav-item">🎁 Tienda</a>
        </div>
    </aside>

    <aside class="chat-sidebar collapsed" id="chat-sidebar">
        <div style="padding:15px;font-weight:700;">💬 Conversaciones</div>
        <div style="padding:10px 15px;font-size:12px;">Amigos</div>
        <div id="friends-sidebar"></div>
        <div style="padding:10px 15px;font-size:12px;">Grupos</div>
        <div id="groups-sidebar"></div>
        <button class="create-group-btn" onclick="openCreateGroupModal()">➕ Crear grupo</button>
    </aside>

    <main class="chat-window">

        <header class="chat-header">
            <div style="display:flex;gap:10px;align-items:center;">
                <div id="header-avatar">👤</div>
                <div>
                    <strong id="current-group-name">@Chat</strong>
                    <p id="header-status-text" style="margin:0;font-size:12px;">● En línea</p>
                </div>
            </div>
            <button id="tasks-toggle-btn" class="task-panel-toggle" style="display:none" onclick="toggleTaskPanel()">
                📋 Tareas
            </button>
        </header>

        <div class="task-panel" id="task-panel">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <h4 style="margin:0;">Misiones del grupo</h4>
                <button class="btn-primary" style="padding:6px 14px;font-size:12px;" onclick="openCreateTaskModal()">+ Nueva</button>
            </div>
            <div id="task-panel-list"></div>
        </div>

        <section class="chat-messages" id="chat-messages-area"></section>

        <footer class="input-bar" style="flex-direction:column;gap:0;padding:0;">
            <!-- Preview de archivo seleccionado -->
            <div id="media-preview" style="display:none;padding:8px 12px;background:#f0f4ff;
                 border-top:1px solid #e0e0e0;align-items:center;gap:10px;flex-wrap:wrap;">
                <span id="media-preview-name" style="font-size:13px;color:#333;flex:1;"></span>
                <button onclick="cancelMedia()"
                    style="border:none;background:none;color:#ff4757;cursor:pointer;font-size:18px;line-height:1;">✕</button>
            </div>
            <div style="display:flex;gap:8px;padding:10px 12px;align-items:center;">
                <!-- Botón multimedia -->
                <input type="file" id="media-file-input" accept="image/*,video/*"
                       style="display:none;" onchange="onMediaSelected(this)">
                <button onclick="document.getElementById('media-file-input').click()"
                    style="background:none;border:none;cursor:pointer;font-size:22px;
                           padding:4px;border-radius:8px;transition:.2s;"
                    title="Adjuntar foto o video">📎</button>
                <input type="text" id="input-chat-main" placeholder="Enviar mensaje..."
                       style="flex:1;">
                <button onclick="enviarMensaje()">Enviar</button>
            </div>
        </footer>

    </main>
</div>
</div>

<!-- MODAL: Crear Grupo -->
<div class="modal-overlay" id="modal-create-group">
    <div class="modal-box">
        <h3>Crear Grupo</h3>
        <label>Nombre</label>
        <input id="new-group-name">
        <label>Icono</label>
        <div class="emoji-picker" id="emoji-picker-create">
            <span class="emoji-option selected" data-emoji="👥">👥</span>
            <span class="emoji-option" data-emoji="⚽">⚽</span>
            <span class="emoji-option" data-emoji="🏆">🏆</span>
            <span class="emoji-option" data-emoji="🔥">🔥</span>
        </div>
        <label>Amigos</label>
        <div class="friend-check-list" id="friend-check-list"></div>
        <small id="create-group-error" style="color:red;"></small>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('modal-create-group')">Cancelar</button>
            <button class="btn-primary" onclick="crearGrupo()">Crear</button>
        </div>
    </div>
</div>

<!-- MODAL: Editar Grupo -->
<div class="modal-overlay" id="modal-edit-group">
    <div class="modal-box">
        <h3>Editar Grupo</h3>
        <input type="hidden" id="edit-group-id">
        <label>Nombre</label>
        <input id="edit-group-name">
        <label>Icono</label>
        <div class="emoji-picker" id="emoji-picker-edit">
            <span class="emoji-option selected" data-emoji="👥">👥</span>
            <span class="emoji-option" data-emoji="⚽">⚽</span>
            <span class="emoji-option" data-emoji="🏆">🏆</span>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('modal-edit-group')">Cancelar</button>
            <button class="btn-primary" onclick="guardarEdicionGrupo()">Guardar</button>
        </div>
    </div>
</div>

<!-- MODAL: Crear Tarea -->
<div class="modal-overlay" id="modal-create-task">
    <div class="modal-box">
        <h3>Nueva Misión</h3>

        <label>Tipo de misión</label>
        <div class="task-type-grid" id="task-type-grid">
            <div class="task-type-option selected" data-type="messages" onclick="selectTaskType(this)">
                <div class="icon">💬</div>
                <div class="label">Mensajes</div>
            </div>
            <div class="task-type-option" data-type="media" onclick="selectTaskType(this)">
                <div class="icon">📸</div>
                <div class="label">Multimedia</div>
            </div>
            <div class="task-type-option" data-type="call" onclick="selectTaskType(this)">
                <div class="icon">📹</div>
                <div class="label">Llamadas</div>
            </div>
        </div>

        <label>Título</label>
        <input id="new-task-title" placeholder="Ej: Escritor del grupo">

        <label>Descripción (opcional)</label>
        <input id="new-task-desc" placeholder="Ej: Escribe mensajes en el grupo">

        <label id="target-label">Meta (número de mensajes)</label>
        <input type="number" id="new-task-target" value="10" min="1">

        <label>Puntos (máx. 1000)</label>
        <div class="points-row">
            <input type="range" id="new-task-points-slider" min="50" max="1000" step="50" value="100"
                oninput="document.getElementById('new-task-points-badge').textContent=this.value">
            <span class="points-badge" id="new-task-points-badge">100</span>
        </div>

        <label>Asignar a (opcional)</label>
        <select id="new-task-assigned">
            <option value="">— Cualquiera del grupo —</option>
        </select>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('modal-create-task')">Cancelar</button>
            <button class="btn-primary" onclick="crearTarea()">Crear misión</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
window.onerror = function(msg, url, line){
    console.log("ERROR:", msg, "Línea:", line);
};

const API_URL = "https://fifa-chat-dr6w.onrender.com";

const userId   = sessionStorage.getItem("user_id")  || localStorage.getItem("user_id");
const userName = sessionStorage.getItem("userName") || localStorage.getItem("userName");

if (!userId || !userName) location.href = "login.html";

document.getElementById("userHeaderName").textContent = userName;

const socket = io(API_URL);

let chatId       = null;
let currentGroup = null;
let myFriends    = [];
let chatType     = "private";

const TASK_TYPE_LABELS = {
    messages: { icon: "💬", label: "Mensajes" },
    media:    { icon: "📸", label: "Multimedia" },
    call:     { icon: "📹", label: "Llamadas" }
};

const TARGET_LABELS = {
    messages: "Meta (número de mensajes)",
    media:    "Meta (número de fotos/videos)",
    call:     "Meta (número de llamadas)"
};

/* SIDEBAR */
function toggleSidebar(e) {
    if (e) e.preventDefault();
    const sb = document.getElementById("chat-sidebar");
    sb.classList.toggle("collapsed");
    sb.classList.toggle("open");
}

/* MODALS */
function openModal(id) { document.getElementById(id).classList.add("active"); }
function closeModal(id) { document.getElementById(id).classList.remove("active"); }

/* EMOJI */
document.querySelectorAll(".emoji-picker").forEach(p => {
    p.querySelectorAll(".emoji-option").forEach(o => {
        o.onclick = () => {
            p.querySelectorAll(".emoji-option").forEach(x => x.classList.remove("selected"));
            o.classList.add("selected");
        };
    });
});

function selectedEmoji(id) {
    return document.querySelector(`#${id} .selected`)?.dataset.emoji || "👥";
}

/* TASK TYPE SELECTOR */
function selectTaskType(el) {
    document.querySelectorAll(".task-type-option").forEach(x => x.classList.remove("selected"));
    el.classList.add("selected");
    const type = el.dataset.type;
    document.getElementById("target-label").textContent = TARGET_LABELS[type] || "Meta";
}

function selectedTaskType() {
    return document.querySelector(".task-type-option.selected")?.dataset.type || "messages";
}

/* CHAT */
function joinChat(id, type, group = null) {
    if (chatId) socket.emit("leave_chat", chatId);
    chatId       = id;
    chatType     = type;
    currentGroup = group;
    socket.emit("join_chat", chatId);

    if (type === "group") {
        document.getElementById("tasks-toggle-btn").style.display = "block";
    } else {
        document.getElementById("tasks-toggle-btn").style.display = "none";
        closeTaskPanel();
    }
    loadMessages();
}

/* FRIENDS */
async function loadFriends() {
    const res = await fetch(`${API_URL}/friends/${userId}`);
    myFriends = await res.json();
    const c = document.getElementById("friends-sidebar");
    c.innerHTML = "";
    myFriends.forEach(f => {
        const div = document.createElement("div");
        div.className = "friend-item";
        div.textContent = "👤 " + f.full_name;
        div.onclick = () => {
            document.getElementById("current-group-name").textContent = f.full_name;
            document.getElementById("header-avatar").textContent = "👤";
            document.getElementById("header-status-text").textContent = "● Privado";
            const a = Math.min(+userId, +f.id);
            const b = Math.max(+userId, +f.id);
            joinChat(`${a}_${b}`, "private");
        };
        c.appendChild(div);
    });
}

/* GROUPS */
async function loadGroups() {
    const res = await fetch(`${API_URL}/groups/${userId}`);
    const groups = await res.json();
    const c = document.getElementById("groups-sidebar");
    c.innerHTML = "";
    groups.forEach(g => {
        const div = document.createElement("div");
        div.className = "friend-item";
        div.innerHTML = `
            <div class="group-item-row">
                <span>${g.image_url} ${g.name}</span>
                ${g.created_by == userId ? `<button class="group-edit-btn">✏️</button>` : ""}
            </div>`;
        div.onclick = (e) => {
            if (e.target.classList.contains("group-edit-btn")) {
                openEditGroupModal(e, g.id, g.name, g.image_url);
                return;
            }
            document.getElementById("current-group-name").textContent = `${g.image_url} ${g.name}`;
            document.getElementById("header-avatar").textContent = g.image_url;
            document.getElementById("header-status-text").textContent = "● Grupo";
            joinChat(`group_${g.id}`, "group", g);
            loadGroupTasks(g.id);
        };
        c.appendChild(div);
    });
}

/* TASKS PANEL */
function toggleTaskPanel() {
    const p = document.getElementById("task-panel");
    p.classList.toggle("open");
    if (p.classList.contains("open") && currentGroup) loadGroupTasks(currentGroup.id);
}

function closeTaskPanel() {
    document.getElementById("task-panel").classList.remove("open");
}

async function loadGroupTasks(groupId) {
    const list = document.getElementById("task-panel-list");
    try {
        list.innerHTML = "Cargando...";
        const res   = await fetch(`${API_URL}/tasks/${groupId}`);
        const tasks = await res.json();
        list.innerHTML = "";
        if (!tasks.length) { list.innerHTML = "Sin tareas"; return; }
        tasks.forEach(t => {
            const current = Number(t.current_value) || 0;
            const target  = Number(t.target_value)  || 1;
            const percent = Math.min((current / target) * 100, 100);
            const div = document.createElement("div");
            div.className = "task-mini-card";
            div.innerHTML = `
                <h4>${t.title}</h4>
                <p>${current}/${target}</p>
                <div class="progress-wrap">
                    <div class="progress-bar" style="width:${percent}%"></div>
                </div>`;
            list.appendChild(div);
        });
    } catch (err) {
        list.innerHTML = "Error cargando tareas";
        console.error(err);
    }
}

/* SOCKET EVENTS */
socket.on("new_message", (msg) => {
    if (String(msg.chat_id).trim() !== String(chatId).trim()) return;
    renderMessage(msg);
    if (chatType === "group" && currentGroup &&
        document.getElementById("task-panel").classList.contains("open")) {
        setTimeout(() => loadGroupTasks(currentGroup.id), 600);
    }
});

socket.on("task_progress", async () => {
    if (chatType === "group" && currentGroup) await loadGroupTasks(currentGroup.id);
});

/* MESSAGES */
async function loadMessages() {
    if (!chatId) return;
    const res  = await fetch(`${API_URL}/messages/${chatId}`);
    const msgs = await res.json();
    const c    = document.getElementById("chat-messages-area");
    c.innerHTML = "";
    msgs.forEach(renderMessage);
}

function renderMessage(msg) {
    const c   = document.getElementById("chat-messages-area");
    const div = document.createElement("div");
    div.className = msg.username === userName ? "message-wrapper sent" : "message-wrapper received";

    let mediaHTML = "";
    if (msg.message_type === "media") {
        const url = msg.message;
        const isVideo = url.match(/\.(mp4|webm|mov|avi)(\?|$)/i);
        if (isVideo) {
            mediaHTML = `<video src="${url}" controls
                style="max-width:100%;max-height:260px;border-radius:10px;display:block;margin-top:6px;">
            </video>`;
        } else {
            mediaHTML = `<img src="${url}" alt="imagen"
                style="max-width:100%;max-height:260px;border-radius:10px;display:block;
                       margin-top:6px;cursor:pointer;"
                onclick="window.open('${url}','_blank')">`;
        }
    }

    div.innerHTML = `
        <div class="message-bubble">
            <b style="font-size:12px;opacity:.8;">${msg.username}</b>
            ${msg.message_type !== "media" ? `<br>${msg.message}` : ""}
            ${mediaHTML}
        </div>`;
    c.appendChild(div);
    c.scrollTop = c.scrollHeight;
}

/* SEND */
async function enviarMensaje() {
    const input   = document.getElementById("input-chat-main");
    const message = input.value.trim();
    if (!chatId) return;

    // Si hay archivo multimedia pendiente, subirlo primero
    if (pendingMediaFile) {
        const sendBtn = document.querySelector(".input-bar button:last-child");
        sendBtn.textContent = "⏳";
        sendBtn.disabled = true;
        try {
            const url = await uploadToSupabase(pendingMediaFile);
            socket.emit("send_message", {
                chat_id: chatId,
                username: userName,
                message: url,
                message_type: "media"
            });
            cancelMedia();
        } catch (err) {
            alert("Error al subir el archivo. Intenta de nuevo.");
            console.error(err);
        } finally {
            sendBtn.textContent = "Enviar";
            sendBtn.disabled = false;
        }
        if (message) input.value = "";
        return;
    }

    if (!message) return;
    socket.emit("send_message", {
        chat_id: chatId,
        username: userName,
        message,
        message_type: "text"
    });
    input.value = "";
    if (chatType === "group" && currentGroup &&

async function crearGrupo() {
    const name      = document.getElementById("new-group-name").value.trim();
    const image_url = selectedEmoji("emoji-picker-create");

/* CREATE TASK */
async function openCreateTaskModal() {
    const select = document.getElementById("new-task-assigned");
    select.innerHTML = `<option value="">— Cualquiera del grupo —</option>`;
    if (currentGroup) {
        const res     = await fetch(`${API_URL}/groups/${currentGroup.id}/members`);
        const members = await res.json();
        members.forEach(m => {
            const opt = document.createElement("option");
            opt.value       = m.id;
            opt.textContent = m.full_name;
            select.appendChild(opt);
        });
    }
    document.getElementById("new-task-title").value  = "";
    document.getElementById("new-task-desc").value   = "";
    document.getElementById("new-task-target").value = "10";
    document.getElementById("new-task-points-slider").value      = "100";
    document.getElementById("new-task-points-badge").textContent = "100";
    document.querySelectorAll(".task-type-option").forEach((el, i) => {
        el.classList.toggle("selected", i === 0);
    });
    document.getElementById("target-label").textContent = TARGET_LABELS["messages"];
    openModal("modal-create-task");
}

async function crearTarea() {
    const title        = document.getElementById("new-task-title").value.trim();
    const description  = document.getElementById("new-task-desc").value.trim();
    const points       = parseInt(document.getElementById("new-task-points-slider").value);
    const task_type    = selectedTaskType();
    const target_value = parseInt(document.getElementById("new-task-target").value);
    const assigned_to  = document.getElementById("new-task-assigned").value || null;
    if (!title) { alert("Por favor escribe un título para la misión."); return; }
    await fetch(`${API_URL}/tasks`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            group_id: currentGroup.id,
            title, description, points, task_type,
            target_value, assigned_to, created_by: userId
        })
    });
    closeModal("modal-create-task");
    loadGroupTasks(currentGroup.id);
}

let pendingMediaFile = null;

function onMediaSelected(input) {
    const file = input.files[0];
    if (!file) return;
    pendingMediaFile = file;
    const preview = document.getElementById("media-preview");
    const name    = document.getElementById("media-preview-name");
    preview.style.display = "flex";
    name.textContent = `📎 ${file.name} (${(file.size/1024/1024).toFixed(1)} MB)`;
}

function cancelMedia() {
    pendingMediaFile = null;
    document.getElementById("media-file-input").value = "";
    document.getElementById("media-preview").style.display = "none";
    document.getElementById("media-preview-name").textContent = "";
}

async function uploadToSupabase(file) {
    const ext      = file.name.split(".").pop();
    const filename = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const res = await fetch(
        `${SUPABASE_URL}/storage/v1/object/media/${filename}`,
        {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${SUPABASE_ANON}`,
                "Content-Type": file.type,
                "x-upsert": "true"
            },
            body: file
        }
    );
    if (!res.ok) throw new Error("Upload failed");
    return `${SUPABASE_URL}/storage/v1/object/public/media/${filename}`;
}
